<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="silver" x1="0.1" y1="0.1" x2="0.9" y2="0.95">
      <stop offset="0%" stop-color="#f2f2f2"/>
      <stop offset="22%" stop-color="#b9b9b9"/>
      <stop offset="48%" stop-color="#5a5a5a"/>
      <stop offset="72%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- forma 3D plateada grande -->
  <path filter="url(#soft)" fill="url(#silver)" d="
    M 360 760
    C 220 560, 360 300, 620 250
    C 880 200, 1040 360, 1180 300
    C 1360 220, 1500 320, 1460 470
    C 1420 610, 1180 560, 1040 640
    C 880 730, 760 620, 620 660
    C 500 694, 460 800, 360 760 Z"/>
  <!-- brillo superior -->
  <path fill="none" stroke="#ffffff" stroke-width="5" opacity="0.55" stroke-linecap="round" d="
    M 560 280 C 800 215, 1000 350, 1180 305 C 1320 270, 1430 320, 1450 430"/>

  <rect width="1600" height="900" filter="url(#grain)" opacity="0.5"/>
</svg>
