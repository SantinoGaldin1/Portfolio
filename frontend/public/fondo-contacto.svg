<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg2" cx="68%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#1f2a55"/>
      <stop offset="48%" stop-color="#141029"/>
      <stop offset="100%" stop-color="#06050d"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5466d8"/>
      <stop offset="55%" stop-color="#6a3fb5"/>
      <stop offset="100%" stop-color="#1c1838"/>
    </linearGradient>
    <filter id="soft2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="75"/>
    </filter>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg2)"/>

  <g filter="url(#soft2)" opacity="0.75">
    <ellipse cx="1180" cy="280" rx="430" ry="350" fill="#4054b0"/>
    <ellipse cx="360" cy="660" rx="420" ry="330" fill="#5a34a8"/>
    <ellipse cx="760" cy="160" rx="260" ry="220" fill="#7b4bd0"/>
  </g>

  <!-- forma rara: ola retorcida -->
  <path d="M180 520 C 420 320, 640 700, 900 480 S 1340 380, 1500 600 C 1320 700, 1060 560, 880 660 S 420 700, 220 640 Z"
        fill="url(#wave)" opacity="0.5" filter="url(#soft2)"/>
  <path d="M260 470 C 480 300, 720 660, 980 460 S 1360 420, 1480 600"
        fill="none" stroke="#8fb0ff" stroke-width="3" opacity="0.32"/>

  <rect width="1600" height="900" filter="url(#grain2)" opacity="0.6"/>
</svg>
